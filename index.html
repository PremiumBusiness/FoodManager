<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>מתכוניאדה - מערכת לניהול מתכונים</title>
  <meta name="description" content="מערכת לניהול מתכונים, רשימת קניות ותכנון שבועי" />
  <style>
    :root {
      --bg: #fafaf9;
      --card: #ffffff;
      --text: #292524;
      --muted: #78716c;
      --border: #e7e5e4;
      --lime: #4d7c0f;
      --lime-dark: #365314;
      --lime-soft: #ecfccb;
      --orange: #f97316;
      --red: #ef4444;
      --shadow: 0 10px 30px rgba(41,37,36,.08);
      --radius: 18px;
      font-family: Arial, "Noto Sans Hebrew", "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); line-height: 1.6; }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; border: 0; background: none; }
    img { max-width: 100%; display: block; }
    .container { max-width: 1180px; margin: 0 auto; padding: 0 18px; }
    header { position: sticky; top: 0; z-index: 20; background: rgba(255,255,255,.94); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
    .topbar { height: 68px; display: flex; justify-content: space-between; align-items: center; gap: 16px; }
    .brand { display: flex; align-items: center; gap: 10px; color: var(--lime); font-weight: 900; font-size: 1.45rem; }
    .logo { width: 42px; height: 42px; border-radius: 14px; background: var(--lime-soft); display: grid; place-items: center; box-shadow: inset 0 0 0 1px #d9f99d; }
    .nav { display: flex; gap: 8px; align-items: center; }
    .nav button { color: #57534e; padding: 10px 12px; border-radius: 999px; font-weight: 700; transition: .2s; }
    .nav button:hover, .nav button.active { color: var(--lime); background: var(--lime-soft); }
    .new-btn { background: var(--lime) !important; color: white !important; padding: 10px 16px !important; }
    main { padding: 28px 0 92px; }
    .hero { background: linear-gradient(135deg, var(--lime-dark), #4d7c0f); color: white; border-radius: 28px; padding: 38px; box-shadow: var(--shadow); overflow: hidden; position: relative; }
    .hero:after { content: ""; position: absolute; width: 320px; height: 320px; background: rgba(255,255,255,.12); border-radius: 40% 60% 65% 35%; left: -80px; top: -90px; }
    .hero-content { position: relative; z-index: 1; max-width: 680px; }
    h1, h2, h3 { line-height: 1.2; margin: 0; }
    .hero h1 { font-size: clamp(2rem, 4vw, 3.2rem); margin-bottom: 14px; }
    .hero p { margin: 0 0 20px; opacity: .9; }
    .searchbox { display: flex; max-width: 620px; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 12px 26px rgba(0,0,0,.18); }
    .searchbox input { flex: 1; padding: 16px 18px; border: 0; outline: 0; color: var(--text); }
    .searchbox button { width: 64px; color: white; background: var(--orange); font-size: 1.25rem; }
    .grid { display: grid; gap: 18px; }
    .quick-grid { grid-template-columns: repeat(4, 1fr); margin: 24px 0 32px; }
    .quick { border-radius: 20px; padding: 20px 14px; text-align: center; font-weight: 800; min-height: 112px; display: grid; place-items: center; color: #365314; background: var(--lime-soft); box-shadow: 0 4px 14px rgba(0,0,0,.04); }
    .quick span:first-child { font-size: 2rem; }
    .quick small { background: rgba(255,255,255,.7); padding: 2px 10px; border-radius: 999px; }
    .section-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin: 18px 0; }
    .section-head h2 { font-size: 1.65rem; }
    .link { color: var(--lime); font-weight: 800; }
    .recipe-grid { grid-template-columns: repeat(3, 1fr); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,.04); transition: .2s; }
    .card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .recipe-img { height: 205px; position: relative; overflow: hidden; background: #e7e5e4; }
    .recipe-img img { width: 100%; height: 100%; object-fit: cover; transition: .45s; }
    .card:hover .recipe-img img { transform: scale(1.04); }
    .favorite { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,.9); width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center; box-shadow: 0 4px 14px rgba(0,0,0,.13); font-size: 1.2rem; }
    .favorite.on { color: var(--red); }
    .time { position: absolute; bottom: 12px; left: 12px; background: rgba(255,255,255,.92); padding: 5px 10px; border-radius: 10px; font-weight: 800; font-size: .85rem; }
    .card-body { padding: 18px; }
    .card h3 { font-size: 1.25rem; margin-bottom: 8px; }
    .card p { color: var(--muted); margin: 0 0 14px; min-height: 48px; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .tag { background: #fff7ed; color: #c2410c; padding: 4px 10px; border-radius: 999px; font-size: .83rem; font-weight: 800; }
    .chips { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; margin: 14px 0 24px; }
    .chip { background: white; border: 1px solid var(--border); padding: 9px 14px; border-radius: 999px; white-space: nowrap; color: #57534e; font-weight: 800; }
    .chip.active { background: var(--text); color: white; }
    .page-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .primary { background: var(--lime); color: white; border-radius: 14px; padding: 12px 18px; font-weight: 900; box-shadow: 0 8px 16px rgba(77,124,15,.18); }
    .secondary { background: #f5f5f4; color: var(--text); border-radius: 14px; padding: 12px 18px; font-weight: 900; }
    .danger { color: var(--red); }
    .details { background: white; border-radius: 26px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .details-hero { height: 360px; position: relative; background: #ddd; }
    .details-hero img { width: 100%; height: 100%; object-fit: cover; }
    .details-hero:after { content: ""; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.78), transparent 62%); }
    .details-title { position: absolute; bottom: 24px; right: 28px; left: 28px; color: white; z-index: 2; }
    .actions { position: absolute; top: 18px; left: 18px; z-index: 3; display: flex; gap: 8px; }
    .icon-btn { width: 44px; height: 44px; border-radius: 50%; background: white; box-shadow: 0 4px 16px rgba(0,0,0,.18); display: grid; place-items: center; font-size: 1.1rem; }
    .details-body { padding: 28px; }
    .meta { display: flex; flex-wrap: wrap; gap: 10px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 16px 0; margin: 20px 0; }
    .meta span { background: #f5f5f4; border-radius: 12px; padding: 7px 12px; font-weight: 800; color: #57534e; }
    .details-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 28px; align-items: start; }
    .panel { background: #fafaf9; border: 1px solid var(--border); border-radius: 20px; padding: 22px; }
    .servings { display: flex; align-items: center; justify-content: space-between; background: white; border: 1px solid var(--border); border-radius: 14px; padding: 8px; margin: 16px 0; font-weight: 900; }
    .servings button { width: 36px; height: 36px; border-radius: 10px; background: #f5f5f4; font-size: 1.25rem; }
    .ingredients { list-style: none; padding: 0; margin: 0; }
    .ingredients li { display: flex; justify-content: space-between; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .steps { display: grid; gap: 16px; margin-top: 16px; }
    .step { display: grid; grid-template-columns: 36px 1fr; gap: 14px; }
    .step-num { width: 36px; height: 36px; border-radius: 50%; background: var(--lime); color: white; display: grid; place-items: center; font-weight: 900; }
    .form { max-width: 820px; margin: 0 auto; background: white; border: 1px solid var(--border); border-radius: 22px; padding: 26px; box-shadow: var(--shadow); }
    .form-section { border-top: 1px solid var(--border); padding-top: 18px; margin-top: 24px; }
    .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .full { grid-column: 1 / -1; }
    label { display: block; color: #57534e; font-weight: 800; margin-bottom: 6px; }
    input, select, textarea { width: 100%; border: 1px solid #d6d3d1; border-radius: 13px; padding: 12px; background: white; outline-color: var(--lime); }
    textarea { resize: vertical; min-height: 82px; }
    .inline-row { display: grid; grid-template-columns: 1fr 110px 130px 46px; gap: 8px; align-items: end; margin-bottom: 10px; }
    .remove { background: #fef2f2; color: var(--red); border-radius: 12px; height: 46px; }
    .shopping { max-width: 760px; margin: 0 auto; }
    .list { background: white; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; box-shadow: 0 5px 18px rgba(0,0,0,.04); }
    .item { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 15px 18px; border-bottom: 1px solid var(--border); }
    .item:last-child { border-bottom: 0; }
    .item.checked { background: #f5f5f4; color: #a8a29e; text-decoration: line-through; }
    .check { width: 26px; height: 26px; border: 2px solid #d6d3d1; border-radius: 8px; display: grid; place-items: center; color: transparent; }
    .checked .check { background: var(--lime); border-color: var(--lime); color: white; text-decoration: none; }
    .empty { text-align: center; padding: 46px 18px; background: white; border: 1px dashed #d6d3d1; border-radius: 20px; color: var(--muted); }
    .planner-grid { grid-template-columns: repeat(4, 1fr); }
    .day { min-height: 150px; padding: 18px; background: white; border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 4px 14px rgba(0,0,0,.03); }
    .bottom-nav { display: none; }
    .hidden { display: none !important; }
    @media (max-width: 850px) {
      .nav { display: none; }
      .quick-grid, .recipe-grid, .planner-grid { grid-template-columns: repeat(2, 1fr); }
      .details-grid { grid-template-columns: 1fr; }
      .details-hero { height: 300px; }
      .form-grid { grid-template-columns: 1fr; }
      .inline-row { grid-template-columns: 1fr 80px 90px 42px; }
      .bottom-nav { position: fixed; bottom: 0; right: 0; left: 0; height: 68px; background: white; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 30; box-shadow: 0 -8px 22px rgba(0,0,0,.07); }
      .bottom-nav button { color: #78716c; font-weight: 800; font-size: .78rem; display: grid; justify-items: center; gap: 2px; }
      .bottom-nav button.active { color: var(--lime); }
      .bottom-nav .add { margin-top: -24px; background: var(--orange); color: white; width: 58px; height: 58px; border-radius: 50%; box-shadow: 0 10px 20px rgba(249,115,22,.35); font-size: 1.65rem; }
    }
    @media (max-width: 560px) {
      .hero { padding: 28px 20px; border-radius: 20px; }
      .quick-grid, .recipe-grid, .planner-grid { grid-template-columns: 1fr; }
      .brand span { display: none; }
      .details-body, .form { padding: 18px; }
      .inline-row { grid-template-columns: 1fr; background: #fafaf9; border: 1px solid var(--border); border-radius: 16px; padding: 12px; }
      .remove { width: 100%; }
      .page-title { align-items: stretch; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container topbar">
      <button class="brand" onclick="app.navigate('home')" aria-label="דף הבית">
        <span class="logo">👨‍🍳</span><span>מתכוניאדה</span>
      </button>
      <nav class="nav" aria-label="ניווט ראשי">
        <button data-nav="home" onclick="app.navigate('home')">🏠 בית</button>
        <button data-nav="recipes" onclick="app.navigate('recipes')">📖 מתכונים</button>
        <button data-nav="favorites" onclick="app.navigate('favorites')">❤️ מועדפים</button>
        <button data-nav="planner" onclick="app.navigate('planner')">📅 תכנון</button>
        <button data-nav="shopping" onclick="app.navigate('shopping')">🛒 קניות</button>
        <button class="new-btn" onclick="app.navigate('form')">＋ חדש</button>
      </nav>
    </div>
  </header>

  <main class="container" id="app"></main>

  <nav class="bottom-nav" aria-label="ניווט מובייל">
    <button data-bottom="home" onclick="app.navigate('home')">🏠<span>בית</span></button>
    <button data-bottom="recipes" onclick="app.navigate('recipes')">🔎<span>חיפוש</span></button>
    <button class="add" onclick="app.navigate('form')">＋</button>
    <button data-bottom="favorites" onclick="app.navigate('favorites')">❤️<span>מועדפים</span></button>
    <button data-bottom="shopping" onclick="app.navigate('shopping')">🛒<span>קניות</span></button>
  </nav>

<script>
const starterRecipes = [
  {
    id: '1', title: 'פסטה ברוטב עגבניות ובזיליקום', description: 'פסטה קלאסית ומהירה שכל משפחה אוהבת.', category: 'עיקרית', servings: 4, prepTime: 10, cookTime: 20, difficulty: 'קל',
    imageUrl: 'https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?auto=format&fit=crop&q=80&w=900',
    ingredients: [
      { name: 'פסטה', amount: 500, unit: 'גרם' }, { name: 'עגבניות מרוסקות', amount: 400, unit: 'גרם' }, { name: 'שום', amount: 3, unit: 'שיניים' }, { name: 'שמן זית', amount: 3, unit: 'כפות' }, { name: 'בזיליקום טרי', amount: 1, unit: 'חופן' }, { name: 'מלח', amount: 1, unit: 'כפית' }
    ],
    instructions: ['מרתיחים סיר גדול עם מים ומלח ומבשלים את הפסטה לפי הוראות היצרן.', 'מחממים שמן זית במחבת ומטגנים שום קצוץ קצרות.', 'מוסיפים עגבניות מרוסקות, מלח ופלפל ומבשלים כ-15 דקות.', 'מסננים את הפסטה ומערבבים עם הרוטב.', 'מוסיפים בזיליקום טרי ומגישים חם.'],
    tags: ['טבעוני', 'מהיר', 'ילדים']
  },
  {
    id: '2', title: 'עוגת שוקולד בחושה', description: 'עוגת שוקולד רכה, עסיסית וקלה להכנה בקערה אחת.', category: 'קינוח', servings: 8, prepTime: 15, cookTime: 40, difficulty: 'קל',
    imageUrl: 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&q=80&w=900',
    ingredients: [
      { name: 'קמח', amount: 2, unit: 'כוסות' }, { name: 'סוכר', amount: 1.5, unit: 'כוסות' }, { name: 'קקאו', amount: 0.5, unit: 'כוסות' }, { name: 'אבקת אפייה', amount: 1, unit: 'שקית' }, { name: 'שמן', amount: 1, unit: 'כוס' }, { name: 'ביצים', amount: 4, unit: 'יחידות' }, { name: 'מים רותחים', amount: 1, unit: 'כוס' }
    ],
    instructions: ['מחממים תנור ל-170 מעלות ומשמנים תבנית.', 'מערבבים בקערה את כל החומרים היבשים.', 'מוסיפים שמן וביצים ומערבבים היטב.', 'מוסיפים מים רותחים תוך ערבוב עד בלילה חלקה.', 'יוצקים לתבנית ואופים כ-40 דקות.'],
    tags: ['פרווה', 'ילדים']
  }
];
const categories = ['ארוחת בוקר', 'עיקרית', 'תוספת', 'קינוח', 'סלט', 'מרק', 'מאפה', 'שתייה'];
const difficulties = ['קל', 'בינוני', 'מתקדם'];
const fallbackImg = 'https://images.unsplash.com/photo-1495195134817-a1a28078aca9?auto=format&fit=crop&q=80&w=900';

const app = {
  state: {
    view: 'home', selectedId: null, search: '', category: '', servings: {},
    recipes: JSON.parse(localStorage.getItem('recipesApp.recipes') || 'null') || starterRecipes,
    favorites: JSON.parse(localStorage.getItem('recipesApp.favorites') || 'null') || ['1'],
    shopping: JSON.parse(localStorage.getItem('recipesApp.shopping') || 'null') || []
  },
  save() {
    localStorage.setItem('recipesApp.recipes', JSON.stringify(this.state.recipes));
    localStorage.setItem('recipesApp.favorites', JSON.stringify(this.state.favorites));
    localStorage.setItem('recipesApp.shopping', JSON.stringify(this.state.shopping));
  },
  navigate(view, id=null) {
    this.state.view = view; this.state.selectedId = id; window.scrollTo({top:0, behavior:'smooth'}); this.render();
  },
  setSearch(value) { this.state.search = value; this.render(); },
  setCategory(value) { this.state.category = value; this.render(); },
  toggleFav(id) {
    const set = new Set(this.state.favorites);
    set.has(id) ? set.delete(id) : set.add(id);
    this.state.favorites = [...set]; this.save(); this.render();
  },
  deleteRecipe(id) {
    if (!confirm('האם למחוק את המתכון? פעולה זו אינה ניתנת לביטול.')) return;
    this.state.recipes = this.state.recipes.filter(r => r.id !== id);
    this.state.favorites = this.state.favorites.filter(x => x !== id);
    this.save(); this.navigate('recipes');
  },
  addToShopping(recipe, servings) {
    const list = [...this.state.shopping];
    recipe.ingredients.forEach(ing => {
      const amount = Number(ing.amount || 0) / Number(recipe.servings || 1) * servings;
      const existing = list.find(item => item.name === ing.name && item.unit === ing.unit && !item.checked);
      if (existing) existing.amount = Number(existing.amount || 0) + amount;
      else list.push({ id: Date.now() + Math.random(), name: ing.name, amount, unit: ing.unit, checked: false });
    });
    this.state.shopping = list; this.save(); alert('המרכיבים נוספו לרשימת הקניות!'); this.render();
  },
  toggleShopping(id) { this.state.shopping = this.state.shopping.map(i => i.id === id ? {...i, checked: !i.checked} : i); this.save(); this.render(); },
  removeShopping(id) { this.state.shopping = this.state.shopping.filter(i => i.id !== id); this.save(); this.render(); },
  clearShopping() { if(confirm('לנקות את כל הרשימה?')) { this.state.shopping = []; this.save(); this.render(); } },
  saveRecipeFromForm(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    const id = fd.get('id') || String(Date.now());
    const ingredients = [...document.querySelectorAll('[data-ing-row]')].map(row => ({
      name: row.querySelector('[name="ingName"]').value.trim(), amount: Number(row.querySelector('[name="ingAmount"]').value || 0), unit: row.querySelector('[name="ingUnit"]').value.trim() || 'יחידות'
    })).filter(i => i.name);
    const instructions = [...document.querySelectorAll('[name="instruction"]')].map(x => x.value.trim()).filter(Boolean);
    if (!fd.get('title') || ingredients.length === 0 || instructions.length === 0) { alert('יש למלא שם, לפחות מרכיב אחד ולפחות שלב הכנה אחד.'); return; }
    const recipe = { id, title: fd.get('title').trim(), description: fd.get('description').trim(), category: fd.get('category'), servings: Number(fd.get('servings') || 1), prepTime: Number(fd.get('prepTime') || 0), cookTime: Number(fd.get('cookTime') || 0), difficulty: fd.get('difficulty'), imageUrl: fd.get('imageUrl').trim(), ingredients, instructions, tags: [] };
    const exists = this.state.recipes.some(r => r.id === id);
    this.state.recipes = exists ? this.state.recipes.map(r => r.id === id ? recipe : r) : [recipe, ...this.state.recipes];
    this.save(); this.navigate('details', id);
  },
  addIngredientRow() {
    document.getElementById('ingredientsRows').insertAdjacentHTML('beforeend', this.ingredientRow({name:'', amount:1, unit:'יחידות'}));
  },
  addInstructionRow() {
    const wrap = document.getElementById('instructionsRows');
    wrap.insertAdjacentHTML('beforeend', `<div class="inline-row" style="grid-template-columns:34px 1fr 46px"><strong>${wrap.children.length + 1}.</strong><textarea name="instruction" required></textarea><button type="button" class="remove" onclick="this.parentElement.remove()">✕</button></div>`);
  },
  filteredRecipes(favsOnly=false) {
    const q = this.state.search.trim();
    return this.state.recipes.filter(r => {
      if (favsOnly && !this.state.favorites.includes(r.id)) return false;
      if (this.state.category && r.category !== this.state.category) return false;
      if (q && !`${r.title} ${r.description} ${r.category} ${r.ingredients.map(i=>i.name).join(' ')}`.includes(q)) return false;
      return true;
    });
  },
  render() {
    document.querySelectorAll('[data-nav],[data-bottom]').forEach(b => b.classList.toggle('active', b.dataset.nav === this.state.view || b.dataset.bottom === this.state.view));
    const root = document.getElementById('app');
    root.innerHTML = this[this.state.view] ? this[this.state.view]() : this.home();
  },
  home() {
    return `<section class="hero"><div class="hero-content"><h1>מה נבשל היום?</h1><p>נהלו מתכונים, מועדפים, רשימת קניות ותכנון שבועי במקום אחד.</p><div class="searchbox"><input value="${escapeHtml(this.state.search)}" oninput="app.state.search=this.value" onkeydown="if(event.key==='Enter') app.navigate('recipes')" placeholder="חיפוש מתכון, מרכיב או קטגוריה..."><button onclick="app.navigate('recipes')">🔎</button></div></div></section>
    <section class="grid quick-grid">
      <button class="quick" onclick="app.navigate('recipes')"><span>📖</span><b>כל המתכונים</b><small>${this.state.recipes.length}</small></button>
      <button class="quick" onclick="app.navigate('favorites')"><span>❤️</span><b>מועדפים</b><small>${this.state.favorites.length}</small></button>
      <button class="quick" onclick="app.navigate('shopping')"><span>🛒</span><b>רשימת קניות</b><small>${this.state.shopping.filter(i=>!i.checked).length}</small></button>
      <button class="quick" onclick="app.navigate('planner')"><span>📅</span><b>תכנון שבועי</b><small>7 ימים</small></button>
    </section>
    <div class="section-head"><h2>מתכונים אחרונים</h2><button class="link" onclick="app.navigate('recipes')">הצג הכל ←</button></div>
    <section class="grid recipe-grid">${this.state.recipes.slice(0,3).map(r => this.recipeCard(r)).join('')}</section>`;
  },
  recipes() { return this.recipeList(false); },
  favorites() { return this.recipeList(true); },
  recipeList(favsOnly) {
    const list = this.filteredRecipes(favsOnly);
    return `<div class="page-title"><h1>${favsOnly ? 'המועדפים שלי' : 'כל המתכונים'}</h1><button class="primary" onclick="app.navigate('form')">＋ הוסף מתכון</button></div>
    <div class="searchbox" style="max-width:100%; margin-bottom:16px"><input value="${escapeHtml(this.state.search)}" oninput="app.setSearch(this.value)" placeholder="חיפוש לפי שם, מרכיב או קטגוריה"><button>🔎</button></div>
    ${!favsOnly ? `<div class="chips"><button class="chip ${!this.state.category?'active':''}" onclick="app.setCategory('')">הכל</button>${categories.map(c=>`<button class="chip ${this.state.category===c?'active':''}" onclick="app.setCategory('${c}')">${c}</button>`).join('')}</div>` : ''}
    ${list.length ? `<section class="grid recipe-grid">${list.map(r => this.recipeCard(r)).join('')}</section>` : `<div class="empty"><h2>לא נמצאו מתכונים</h2><p>נסו לשנות חיפוש או להוסיף מתכון חדש.</p></div>`}`;
  },
  recipeCard(r) {
    const fav = this.state.favorites.includes(r.id);
    return `<article class="card" onclick="app.navigate('details','${r.id}')"><div class="recipe-img"><img src="${escapeAttr(r.imageUrl || fallbackImg)}" alt="${escapeAttr(r.title)}"><button class="favorite ${fav?'on':''}" onclick="event.stopPropagation(); app.toggleFav('${r.id}')">${fav?'♥':'♡'}</button><span class="time">⏱ ${Number(r.prepTime||0)+Number(r.cookTime||0)} דק׳</span></div><div class="card-body"><h3>${escapeHtml(r.title)}</h3><p>${escapeHtml(r.description || '')}</p><div class="row"><span class="tag">${escapeHtml(r.category)}</span><strong class="link">למתכון המלא ←</strong></div></div></article>`;
  },
  details() {
    const r = this.state.recipes.find(x => x.id === this.state.selectedId);
    if (!r) return `<div class="empty">המתכון לא נמצא</div>`;
    const servings = this.state.servings[r.id] || Number(r.servings || 1);
    const fav = this.state.favorites.includes(r.id);
    const ingHtml = r.ingredients.map(ing => {
      const amount = Number(ing.amount || 0) / Number(r.servings || 1) * servings;
      return `<li><span>${escapeHtml(ing.name)}</span><strong dir="ltr">${formatNum(amount)} ${escapeHtml(ing.unit)}</strong></li>`;
    }).join('');
    return `<article class="details"><div class="details-hero"><img src="${escapeAttr(r.imageUrl || fallbackImg)}" alt="${escapeAttr(r.title)}"><div class="actions"><button class="icon-btn ${fav?'danger':''}" onclick="app.toggleFav('${r.id}')">${fav?'♥':'♡'}</button><button class="icon-btn" onclick="app.navigate('form','${r.id}')">✎</button><button class="icon-btn danger" onclick="app.deleteRecipe('${r.id}')">🗑</button></div><div class="details-title"><span class="tag">${escapeHtml(r.category)}</span><h1>${escapeHtml(r.title)}</h1></div></div><div class="details-body"><p>${escapeHtml(r.description || '')}</p><div class="meta"><span>⏱ הכנה: ${r.prepTime} דק׳</span><span>🍳 בישול: ${r.cookTime} דק׳</span><span>👥 ${r.servings} מנות</span><span>📖 קושי: ${escapeHtml(r.difficulty)}</span></div><div class="details-grid"><aside class="panel"><h2>מרכיבים</h2><div class="servings"><button onclick="app.state.servings['${r.id}']=Math.max(1,${servings}-1);app.render()">−</button><span>${servings} מנות</span><button onclick="app.state.servings['${r.id}']=${servings}+1;app.render()">＋</button></div><ul class="ingredients">${ingHtml}</ul><button class="primary" style="width:100%; margin-top:18px" onclick="app.addToShopping(app.state.recipes.find(r=>r.id==='${r.id}'), ${servings})">🛒 הוסף לרשימת קניות</button></aside><section><h2>אופן ההכנה</h2><div class="steps">${r.instructions.map((s,i)=>`<div class="step"><span class="step-num">${i+1}</span><p>${escapeHtml(s)}</p></div>`).join('')}</div></section></div></div></article>`;
  },
  form() {
    const r = this.state.selectedId ? this.state.recipes.find(x => x.id === this.state.selectedId) : null;
    const recipe = r || {id:'', title:'', description:'', category:categories[0], servings:4, prepTime:10, cookTime:20, difficulty:difficulties[0], imageUrl:'', ingredients:[{name:'',amount:1,unit:'יחידות'}], instructions:['']};
    return `<form class="form" onsubmit="app.saveRecipeFromForm(event)"><input type="hidden" name="id" value="${escapeAttr(recipe.id)}"><h1>${r?'עריכת מתכון':'מתכון חדש'}</h1><section class="form-section"><h2>פרטים כלליים</h2><div class="form-grid"><div class="full"><label>שם המתכון *</label><input name="title" required value="${escapeAttr(recipe.title)}"></div><div class="full"><label>תיאור קצר</label><textarea name="description">${escapeHtml(recipe.description || '')}</textarea></div><div><label>קטגוריה</label><select name="category">${categories.map(c=>`<option ${recipe.category===c?'selected':''}>${c}</option>`).join('')}</select></div><div><label>מספר מנות</label><input name="servings" type="number" min="1" value="${recipe.servings}"></div><div><label>זמן הכנה בדקות</label><input name="prepTime" type="number" min="0" value="${recipe.prepTime}"></div><div><label>זמן בישול בדקות</label><input name="cookTime" type="number" min="0" value="${recipe.cookTime}"></div><div><label>רמת קושי</label><select name="difficulty">${difficulties.map(d=>`<option ${recipe.difficulty===d?'selected':''}>${d}</option>`).join('')}</select></div><div><label>קישור לתמונה</label><input name="imageUrl" type="url" dir="ltr" value="${escapeAttr(recipe.imageUrl || '')}" placeholder="https://..."></div></div></section><section class="form-section"><h2>מרכיבים</h2><div id="ingredientsRows">${recipe.ingredients.map(i=>this.ingredientRow(i)).join('')}</div><button type="button" class="secondary" onclick="app.addIngredientRow()">＋ הוסף מרכיב</button></section><section class="form-section"><h2>אופן ההכנה</h2><div id="instructionsRows">${recipe.instructions.map((s,i)=>`<div class="inline-row" style="grid-template-columns:34px 1fr 46px"><strong>${i+1}.</strong><textarea name="instruction" required>${escapeHtml(s)}</textarea><button type="button" class="remove" onclick="this.parentElement.remove()">✕</button></div>`).join('')}</div><button type="button" class="secondary" onclick="app.addInstructionRow()">＋ הוסף שלב</button></section><div class="row" style="margin-top:24px"><button class="primary" type="submit">שמור מתכון</button><button class="secondary" type="button" onclick="app.navigate('${r?'details':'recipes'}','${recipe.id}')">ביטול</button></div></form>`;
  },
  ingredientRow(i) {
    return `<div class="inline-row" data-ing-row><input name="ingName" placeholder="שם מרכיב" required value="${escapeAttr(i.name || '')}"><input name="ingAmount" type="number" step="0.1" placeholder="כמות" value="${escapeAttr(i.amount ?? 1)}"><input name="ingUnit" placeholder="יחידה" value="${escapeAttr(i.unit || 'יחידות')}"><button type="button" class="remove" onclick="this.parentElement.remove()">✕</button></div>`;
  },
  shopping() {
    return `<section class="shopping"><div class="page-title"><h1>🛒 רשימת קניות</h1>${this.state.shopping.length ? `<button class="secondary danger" onclick="app.clearShopping()">נקה רשימה</button>` : ''}</div>${this.state.shopping.length ? `<div class="list">${this.state.shopping.map(i=>`<div class="item ${i.checked?'checked':''}"><button class="row" onclick="app.toggleShopping(${i.id})"><span class="check">✓</span><strong>${escapeHtml(i.name)}</strong></button><div class="row"><span dir="ltr">${formatNum(i.amount)} ${escapeHtml(i.unit)}</span><button class="danger" onclick="app.removeShopping(${i.id})">🗑</button></div></div>`).join('')}</div>` : `<div class="empty"><h2>הרשימה ריקה</h2><p>פתחו מתכון ולחצו על “הוסף לרשימת קניות”.</p></div>`}</section>`;
  },
  planner() {
    const days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
    return `<div class="page-title"><h1>📅 תכנון שבועי</h1><button class="primary" onclick="app.navigate('recipes')">בחר מתכון</button></div><p style="color:var(--muted)">גרסת דמו לתכנון שבועי. ניתן להרחיב אותה לשיבוץ מתכונים לכל ארוחה.</p><section class="grid planner-grid">${days.map(d=>`<div class="day"><h3>יום ${d}</h3><hr><p style="color:var(--muted); text-align:center">אין ארוחות מתוכננות</p><button class="link" onclick="app.navigate('recipes')">הוסף מתכון</button></div>`).join('')}</section>`;
  }
};
function escapeHtml(str='') { return String(str).replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s])); }
function escapeAttr(str='') { return escapeHtml(str).replace(/'/g, '&#39;'); }
function formatNum(n) { n = Number(n || 0); return Number.isInteger(n) ? String(n) : n.toFixed(1).replace(/\.0$/, ''); }
app.render();
</script>
</body>
</html>
