<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>מתכוניאדה - מערכת לניהול מתכונים</title>
  <meta name="description" content="מערכת לניהול מתכונים, רשימת קניות ומועדפים" />
  <style>
    :root{
      --bg:#f8f7f3;--card:#fff;--text:#292524;--muted:#78716c;--line:#e7e5e4;
      --lime:#4d7c0f;--lime2:#65a30d;--limeSoft:#ecfccb;--orange:#f97316;--red:#ef4444;
      --shadow:0 10px 25px rgba(41,37,36,.08);--radius:22px
    }
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,"Noto Sans Hebrew","Segoe UI",sans-serif;line-height:1.55} button,input,textarea,select{font:inherit} button{cursor:pointer;border:0}
    .container{max-width:1180px;margin:0 auto;padding:0 18px}.topbar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);box-shadow:0 1px 0 var(--line)}
    .nav{height:70px;display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{display:flex;align-items:center;gap:10px;color:var(--lime);font-weight:900;font-size:26px}.brand-icon{font-size:32px}.nav-links{display:flex;gap:10px;align-items:center}.nav-btn{background:transparent;color:#57534e;padding:10px 14px;border-radius:999px;font-weight:700}.nav-btn:hover,.nav-btn.active{background:var(--limeSoft);color:var(--lime)}.add-btn{background:var(--lime2);color:#fff;padding:11px 18px;border-radius:999px;font-weight:900;box-shadow:0 6px 14px rgba(101,163,13,.22)}
    main{padding:30px 0 90px}.hero{background:linear-gradient(135deg,#365314,#4d7c0f);color:white;border-radius:var(--radius);padding:42px;position:relative;overflow:hidden;box-shadow:var(--shadow)}.hero:after{content:"";position:absolute;inset:auto -70px -120px auto;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.12)}.hero h1{margin:0 0 18px;font-size:clamp(32px,5vw,54px);line-height:1.1}.searchbox{position:relative;display:flex;max-width:650px;background:white;border-radius:16px;overflow:hidden;box-shadow:0 12px 30px rgba(0,0,0,.18)}.searchbox input{width:100%;border:0;padding:17px 18px;outline:0;color:#292524}.searchbox button{background:var(--orange);color:#fff;padding:0 22px;font-weight:900}.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:22px 0 34px}.quick{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;text-align:center;box-shadow:var(--shadow);transition:.2s}.quick:hover{transform:translateY(-3px)}.quick .icon{font-size:32px}.quick strong{display:block;margin:7px 0}.quick span{color:var(--muted);font-size:14px}.section-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:24px 0 16px}.section-head h2,.page-title{margin:0;font-size:30px}.link{color:var(--lime);background:transparent;font-weight:900}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:var(--shadow);transition:.2s}.card:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(41,37,36,.12)}.card-img{height:205px;position:relative;background:#ddd;overflow:hidden}.card-img img{width:100%;height:100%;object-fit:cover;display:block}.fav{position:absolute;top:12px;right:12px;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.88);font-size:21px;color:#999}.fav.on{color:var(--red)}.time-badge{position:absolute;left:12px;bottom:12px;background:rgba(255,255,255,.9);border-radius:999px;padding:5px 10px;font-weight:900;font-size:13px}.card-body{padding:18px}.card h3{margin:0 0 8px;font-size:22px;line-height:1.25}.card p{margin:0 0 14px;color:var(--muted)}.row{display:flex;justify-content:space-between;align-items:center;gap:10px}.tag{background:#fff7ed;color:#c2410c;border-radius:999px;padding:5px 10px;font-size:13px;font-weight:900}.open{color:var(--lime);font-weight:900;background:transparent}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}.chips{display:flex;gap:8px;overflow:auto;padding-bottom:8px;margin-bottom:18px}.chip{white-space:nowrap;background:white;border:1px solid var(--line);border-radius:999px;padding:9px 15px;color:#57534e}.chip.active{background:#292524;color:white}.details{background:white;border-radius:24px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--line)}.details-cover{height:360px;position:relative;background:#ddd}.details-cover img{width:100%;height:100%;object-fit:cover}.cover-actions{position:absolute;top:16px;left:16px;display:flex;gap:8px}.round{width:45px;height:45px;border-radius:50%;background:white;box-shadow:0 6px 16px rgba(0,0,0,.15);font-size:19px}.cover-title{position:absolute;right:0;left:0;bottom:0;padding:28px;color:#fff;background:linear-gradient(0deg,rgba(0,0,0,.78),transparent)}.cover-title h1{font-size:42px;margin:8px 0 0}.details-body{padding:28px}.meta{display:flex;flex-wrap:wrap;gap:10px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:15px 0;margin:20px 0}.meta div{background:#f5f5f4;border-radius:12px;padding:8px 12px}.details-grid{display:grid;grid-template-columns:1fr 2fr;gap:28px}.ingredients{background:#fafaf9;border:1px solid var(--line);border-radius:18px;padding:20px}.servings{display:flex;justify-content:space-between;align-items:center;background:white;border:1px solid var(--line);border-radius:14px;padding:8px;margin:10px 0 18px}.servings button{width:36px;height:36px;border-radius:10px;background:#f5f5f4;font-size:22px}.ingredients ul{list-style:none;padding:0;margin:0}.ingredients li{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:10px 0}.ingredients li:last-child{border-bottom:0}.cart-btn,.save-btn{width:100%;background:var(--lime2);color:white;border-radius:14px;padding:14px;font-weight:900;margin-top:18px}.steps{counter-reset:step}.step{display:flex;gap:12px;margin:0 0 18px}.num{flex:0 0 34px;height:34px;border-radius:50%;background:var(--lime2);color:white;display:flex;align-items:center;justify-content:center;font-weight:900}.form{background:white;border:1px solid var(--line);box-shadow:var(--shadow);border-radius:22px;padding:26px;max-width:820px;margin:0 auto}.form h1{margin-top:0}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{margin-bottom:14px}.field label{display:block;font-weight:900;margin-bottom:6px;color:#57534e}.field input,.field textarea,.field select{width:100%;border:1px solid #d6d3d1;border-radius:12px;padding:12px;background:white}.field textarea{resize:vertical}.dyn-row{display:grid;grid-template-columns:1fr 90px 110px 42px;gap:8px;margin-bottom:8px}.small-danger{background:#fee2e2;color:#b91c1c;border-radius:10px}.sub-btn{background:#ecfccb;color:var(--lime);border-radius:12px;padding:10px 14px;font-weight:900;margin:4px 0 18px}.actions{display:flex;gap:12px;border-top:1px solid var(--line);padding-top:18px}.cancel-btn{background:#f5f5f4;color:#57534e;border-radius:14px;padding:14px 20px;font-weight:900}.shopping{max-width:760px;margin:0 auto}.list{background:white;border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow)}.item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line)}.item:last-child{border-bottom:0}.item.done{background:#fafaf9;color:#a8a29e;text-decoration:line-through}.check{width:28px;height:28px;border-radius:8px;border:1px solid #d6d3d1;background:white}.item.done .check{background:var(--lime2);color:white}.empty{border:2px dashed #d6d3d1;border-radius:18px;padding:40px;text-align:center;color:var(--muted);background:#fafaf9}.planner{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}.day{background:white;border:1px solid var(--line);border-radius:18px;padding:18px;min-height:160px;box-shadow:var(--shadow)}.day h3{margin:0 0 14px;border-bottom:1px solid var(--line);padding-bottom:10px}.hidden{display:none!important}.mobile-only{display:none}.bottom-nav{display:none}
    @media(max-width:850px){.nav-links,.desktop-add{display:none}.mobile-only{display:inline-flex}.quick-grid{grid-template-columns:repeat(2,1fr)}.cards{grid-template-columns:1fr}.details-grid{grid-template-columns:1fr}.details-cover{height:270px}.cover-title h1{font-size:30px}.grid2{grid-template-columns:1fr}.dyn-row{grid-template-columns:1fr 80px 90px 40px}.planner{grid-template-columns:1fr}.bottom-nav{position:fixed;bottom:0;right:0;left:0;height:66px;background:white;border-top:1px solid var(--line);display:flex;justify-content:space-around;align-items:center;z-index:20}.bottom-nav button{background:transparent;color:#57534e;font-size:12px}.bottom-nav .active{color:var(--lime);font-weight:900}.hero{padding:28px 20px}.section-head{align-items:flex-start}.toolbar{flex-direction:column;align-items:stretch}.toolbar .add-btn{width:100%}}
  </style>
</head>
<body>
  <header class="topbar"><div class="container nav"><div class="brand" onclick="go('home')"><span class="brand-icon">🍳</span><span>מתכוניאדה</span></div><nav class="nav-links"><button class="nav-btn" data-nav="home" onclick="go('home')">בית</button><button class="nav-btn" data-nav="recipes" onclick="go('recipes')">מתכונים</button><button class="nav-btn" data-nav="favorites" onclick="go('favorites')">מועדפים</button><button class="nav-btn" data-nav="planner" onclick="go('planner')">תכנון</button><button class="nav-btn" data-nav="shopping" onclick="go('shopping')">קניות <span id="cartCountTop"></span></button></nav><button class="add-btn desktop-add" onclick="openForm()">+ מתכון חדש</button><button class="add-btn mobile-only" onclick="openForm()">+</button></div></header>
  <main class="container" id="app"></main>
  <nav class="bottom-nav"><button data-bottom="home" onclick="go('home')">🏠<br>בית</button><button data-bottom="recipes" onclick="go('recipes')">🔎<br>חיפוש</button><button onclick="openForm()" style="background:#f97316;color:white;width:58px;height:58px;border-radius:50%;font-size:26px;margin-top:-28px">+</button><button data-bottom="favorites" onclick="go('favorites')">❤️<br>מועדפים</button><button data-bottom="shopping" onclick="go('shopping')">🛒<br>קניות</button></nav>
  <script>
    const STORAGE_KEY='metkoniada_static_v2';
    const fallbackImg='https://images.unsplash.com/photo-1495195134817-a1a28078aca9?auto=format&fit=crop&q=80&w=900';
    const categories=['ארוחת בוקר','עיקרית','תוספת','קינוח','סלט','מרק','מאפה','שתייה'];
    const difficulties=['קל','בינוני','מתקדם'];
    const initialRecipes=[{id:'1',title:'פסטה ברוטב עגבניות ובזיליקום',description:'פסטה קלאסית ומהירה שכל משפחה אוהבת.',category:'עיקרית',servings:4,prepTime:10,cookTime:20,difficulty:'קל',imageUrl:'https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?auto=format&fit=crop&q=80&w=900',ingredients:[{name:'פסטה',amount:500,unit:'גרם'},{name:'עגבניות מרוסקות',amount:400,unit:'גרם'},{name:'שום',amount:3,unit:'שיניים'},{name:'שמן זית',amount:3,unit:'כפות'},{name:'בזיליקום טרי',amount:1,unit:'חופן'}],instructions:['מרתיחים סיר גדול עם מים ומלח ומבשלים את הפסטה לפי הוראות היצרן.','מחממים שמן זית במחבת ומטגנים שום קצרות.','מוסיפים עגבניות, מלח ופלפל ומבשלים כ-15 דקות.','מערבבים את הפסטה עם הרוטב ומוסיפים בזיליקום טרי.'],tags:['טבעוני','מהיר','ילדים']},{id:'2',title:'עוגת שוקולד בחושה',description:'עוגת שוקולד רכה, עסיסית וקלה להכנה בקערה אחת.',category:'קינוח',servings:8,prepTime:15,cookTime:40,difficulty:'קל',imageUrl:'https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&q=80&w=900',ingredients:[{name:'קמח',amount:2,unit:'כוסות'},{name:'סוכר',amount:1.5,unit:'כוסות'},{name:'קקאו',amount:.5,unit:'כוסות'},{name:'שמן',amount:1,unit:'כוס'},{name:'ביצים',amount:4,unit:'יחידות'}],instructions:['מחממים תנור ל-170 מעלות ומשמנים תבנית.','מערבבים בקערה את החומרים היבשים.','מוסיפים שמן וביצים ומערבבים.','מוסיפים מים רותחים בהדרגה ואופים כ-40 דקות.'],tags:['פרווה','ילדים']}];
    let state=load(); let view='home'; let selectedId=null; let search=''; let filterCat='';
    function load(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{recipes:initialRecipes,favorites:['1'],shopping:[]}}catch(e){return{recipes:initialRecipes,favorites:['1'],shopping:[]}}}
    function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); updateCounts()}
    function app(){return document.getElementById('app')}
    function esc(s){return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
    function amount(v){const n=Number(v)||0; return n%1?n.toFixed(1):String(n)}
    function updateCounts(){document.getElementById('cartCountTop').textContent=state.shopping.filter(x=>!x.checked).length?`(${state.shopping.filter(x=>!x.checked).length})`:'';document.querySelectorAll('[data-nav],[data-bottom]').forEach(b=>b.classList.remove('active'));document.querySelectorAll(`[data-nav="${view}"],[data-bottom="${view}"]`).forEach(b=>b.classList.add('active'))}
    function go(v){view=v; selectedId=null; window.scrollTo(0,0); render()}
    function openForm(id=null){view='form'; selectedId=id; window.scrollTo(0,0); render()}
    function openDetails(id){view='details'; selectedId=id; window.scrollTo(0,0); render()}
    function toggleFav(id){state.favorites=state.favorites.includes(id)?state.favorites.filter(x=>x!==id):[...state.favorites,id];save();render()}
    function deleteRecipe(id){if(!confirm('האם למחוק את המתכון? פעולה זו אינה ניתנת לביטול.'))return;state.recipes=state.recipes.filter(r=>r.id!==id);state.favorites=state.favorites.filter(x=>x!==id);save();go('recipes')}
    function addToCart(ings,servings,base){ings.forEach(i=>{const add=(Number(i.amount)||0)*servings/base;let found=state.shopping.find(x=>x.name===i.name&&x.unit===i.unit&&!x.checked);if(found)found.amount+=add;else state.shopping.push({id:Date.now()+Math.random(),name:i.name,amount:add,unit:i.unit,checked:false})});save();alert('המרכיבים נוספו לרשימת הקניות');}
    function card(r){const fav=state.favorites.includes(r.id);return `<article class="card"><div class="card-img" onclick="openDetails('${r.id}')"><img src="${esc(r.imageUrl||fallbackImg)}" alt="${esc(r.title)}"><button class="fav ${fav?'on':''}" onclick="event.stopPropagation();toggleFav('${r.id}')">♥</button><span class="time-badge">⏱ ${Number(r.prepTime||0)+Number(r.cookTime||0)} דק׳</span></div><div class="card-body" onclick="openDetails('${r.id}')"><h3>${esc(r.title)}</h3><p>${esc(r.description)}</p><div class="row"><span class="tag">${esc(r.category)}</span><button class="open">למתכון המלא ←</button></div></div></article>`}
    function dashboard(){app().innerHTML=`<section class="hero"><h1>מה נבשל היום?</h1><div class="searchbox"><input id="q" placeholder="חיפוש מתכון, מרכיב או קטגוריה..." value="${esc(search)}" onkeydown="if(event.key==='Enter'){search=this.value;go('recipes')}"><button onclick="search=document.getElementById('q').value;go('recipes')">חפש</button></div></section><section class="quick-grid"><button class="quick" onclick="go('recipes')"><span class="icon">📖</span><strong>כל המתכונים</strong><span>${state.recipes.length} מתכונים</span></button><button class="quick" onclick="go('favorites')"><span class="icon">❤️</span><strong>מועדפים</strong><span>${state.favorites.length} מתכונים</span></button><button class="quick" onclick="go('shopping')"><span class="icon">🛒</span><strong>רשימת קניות</strong><span>${state.shopping.filter(i=>!i.checked).length} פריטים</span></button><button class="quick" onclick="go('planner')"><span class="icon">📅</span><strong>תכנון שבועי</strong><span>מסך תכנון</span></button></section><div class="section-head"><h2>מתכונים אחרונים</h2><button class="link" onclick="go('recipes')">הצג הכל</button></div><section class="cards">${state.recipes.slice(0,3).map(card).join('')}</section>`;updateCounts()}
    function recipesList(favs=false){let list=state.recipes.filter(r=>(!favs||state.favorites.includes(r.id))&&(!search||r.title.includes(search)||r.category.includes(search)||(r.ingredients||[]).some(i=>i.name.includes(search)))&&(!filterCat||r.category===filterCat));app().innerHTML=`<div class="toolbar"><h1 class="page-title">${favs?'המועדפים שלי':'כל המתכונים'}</h1><button class="add-btn" onclick="openForm()">+ הוסף מתכון</button></div>${!favs?`<div class="searchbox" style="max-width:none;margin-bottom:16px"><input id="listQ" placeholder="חיפוש..." value="${esc(search)}" oninput="search=this.value;recipesList(false)"><button onclick="search=document.getElementById('listQ').value;recipesList(false)">חפש</button></div><div class="chips"><button class="chip ${!filterCat?'active':''}" onclick="filterCat='';recipesList(false)">הכל</button>${categories.map(c=>`<button class="chip ${filterCat===c?'active':''}" onclick="filterCat='${c}';recipesList(false)">${c}</button>`).join('')}</div>`:''}${list.length?`<section class="cards">${list.map(card).join('')}</section>`:`<div class="empty">🍳<br><br>לא נמצאו מתכונים.</div>`}`;updateCounts()}
    function details(){const r=state.recipes.find(x=>x.id===selectedId);if(!r){app().innerHTML='<div class="empty">המתכון לא נמצא</div>';return}let servings=r.servings;function paint(){const fav=state.favorites.includes(r.id);app().innerHTML=`<article class="details"><div class="details-cover"><img src="${esc(r.imageUrl||fallbackImg)}" alt="${esc(r.title)}"><div class="cover-actions"><button class="round" onclick="toggleFav('${r.id}')">${fav?'❤️':'🤍'}</button><button class="round" onclick="openForm('${r.id}')">✏️</button><button class="round" onclick="deleteRecipe('${r.id}')">🗑️</button></div><div class="cover-title"><span class="tag">${esc(r.category)}</span><h1>${esc(r.title)}</h1></div></div><div class="details-body"><p style="font-size:19px;color:#57534e">${esc(r.description)}</p><div class="meta"><div>⏱ הכנה: <b>${esc(r.prepTime)} דק׳</b></div><div>👨‍🍳 בישול: <b>${esc(r.cookTime)} דק׳</b></div><div>👥 מנות: <b>${esc(r.servings)}</b></div><div>📖 קושי: <b>${esc(r.difficulty)}</b></div></div><div class="details-grid"><aside class="ingredients"><h2>מרכיבים</h2><div class="servings"><button id="minus">−</button><b>${servings} מנות</b><button id="plus">+</button></div><ul>${(r.ingredients||[]).map(i=>`<li><span>${esc(i.name)}</span><b dir="ltr">${amount((Number(i.amount)||0)*servings/r.servings)} ${esc(i.unit)}</b></li>`).join('')}</ul><button class="cart-btn" id="cartBtn">הוסף לרשימת קניות</button></aside><section><h2>אופן ההכנה</h2>${(r.instructions||[]).map((s,i)=>`<div class="step"><span class="num">${i+1}</span><p>${esc(s)}</p></div>`).join('')}${r.tags?`<p>${r.tags.map(t=>`<span class="tag">#${esc(t)}</span>`).join(' ')}</p>`:''}</section></div></div></article>`;document.getElementById('minus').onclick=()=>{servings=Math.max(1,servings-1);paint()};document.getElementById('plus').onclick=()=>{servings++;paint()};document.getElementById('cartBtn').onclick=()=>addToCart(r.ingredients,servings,r.servings);updateCounts()}paint()}
    function form(){const r=selectedId?state.recipes.find(x=>x.id===selectedId):null;const data=r?JSON.parse(JSON.stringify(r)):{id:'',title:'',description:'',category:categories[0],servings:4,prepTime:10,cookTime:20,difficulty:'קל',imageUrl:'',ingredients:[{name:'',amount:1,unit:'יחידות'}],instructions:[''],tags:[]};app().innerHTML=`<section class="form"><h1>${r?'עריכת מתכון':'מתכון חדש'}</h1><form id="recipeForm"><div class="grid2"><div class="field" style="grid-column:1/-1"><label>שם המתכון *</label><input name="title" required value="${esc(data.title)}"></div><div class="field" style="grid-column:1/-1"><label>תיאור קצר</label><textarea name="description" rows="2">${esc(data.description)}</textarea></div><div class="field"><label>קטגוריה</label><select name="category">${categories.map(c=>`<option ${data.category===c?'selected':''}>${c}</option>`).join('')}</select></div><div class="field"><label>מספר מנות</label><input type="number" min="1" name="servings" value="${esc(data.servings)}"></div><div class="field"><label>זמן הכנה</label><input type="number" min="0" name="prepTime" value="${esc(data.prepTime)}"></div><div class="field"><label>זמן בישול</label><input type="number" min="0" name="cookTime" value="${esc(data.cookTime)}"></div><div class="field"><label>רמת קושי</label><select name="difficulty">${difficulties.map(d=>`<option ${data.difficulty===d?'selected':''}>${d}</option>`).join('')}</select></div><div class="field"><label>קישור לתמונה</label><input name="imageUrl" dir="ltr" value="${esc(data.imageUrl)}"></div></div><h2>מרכיבים</h2><div id="ings"></div><button type="button" class="sub-btn" onclick="addIng()">+ הוסף מרכיב</button><h2>אופן ההכנה</h2><div id="insts"></div><button type="button" class="sub-btn" onclick="addInst()">+ הוסף שלב</button><div class="actions"><button class="save-btn" type="submit" style="margin:0">שמור מתכון</button><button type="button" class="cancel-btn" onclick="go('${r?'details':'recipes'}');${r?`selectedId='${r.id}';`:''}">ביטול</button></div></form></section>`;window.tempIngs=data.ingredients.length?data.ingredients:[{name:'',amount:1,unit:'יחידות'}];window.tempInsts=data.instructions.length?data.instructions:[''];drawDyn();document.getElementById('recipeForm').onsubmit=e=>{e.preventDefault();const f=new FormData(e.target);const obj={id:r?r.id:String(Date.now()),title:f.get('title').trim(),description:f.get('description').trim(),category:f.get('category'),servings:Number(f.get('servings'))||1,prepTime:Number(f.get('prepTime'))||0,cookTime:Number(f.get('cookTime'))||0,difficulty:f.get('difficulty'),imageUrl:f.get('imageUrl').trim(),ingredients:window.tempIngs.filter(i=>i.name.trim()),instructions:window.tempInsts.filter(s=>String(s).trim()),tags:r?r.tags:[]};if(!obj.title||!obj.ingredients.length||!obj.instructions.length){alert('יש למלא שם, מרכיבים והוראות הכנה.');return}if(r)state.recipes=state.recipes.map(x=>x.id===r.id?obj:x);else state.recipes.unshift(obj);save();openDetails(obj.id)}}
    function drawDyn(){document.getElementById('ings').innerHTML=window.tempIngs.map((i,idx)=>`<div class="dyn-row"><input placeholder="שם מרכיב" value="${esc(i.name)}" oninput="tempIngs[${idx}].name=this.value"><input type="number" step="0.1" value="${esc(i.amount)}" oninput="tempIngs[${idx}].amount=this.value"><input value="${esc(i.unit)}" oninput="tempIngs[${idx}].unit=this.value"><button type="button" class="small-danger" onclick="tempIngs.splice(${idx},1);drawDyn()">×</button></div>`).join('');document.getElementById('insts').innerHTML=window.tempInsts.map((s,idx)=>`<div class="dyn-row" style="grid-template-columns:32px 1fr 42px"><b>${idx+1}.</b><textarea rows="2" oninput="tempInsts[${idx}]=this.value">${esc(s)}</textarea><button type="button" class="small-danger" onclick="tempInsts.splice(${idx},1);drawDyn()">×</button></div>`).join('')}
    function addIng(){window.tempIngs.push({name:'',amount:1,unit:'יחידות'});drawDyn()} function addInst(){window.tempInsts.push('');drawDyn()}
    function shopping(){app().innerHTML=`<section class="shopping"><div class="toolbar"><h1 class="page-title">🛒 רשימת קניות</h1>${state.shopping.length?`<button class="cancel-btn" onclick="if(confirm('לנקות את כל הרשימה?')){state.shopping=[];save();shopping()}">נקה רשימה</button>`:''}</div>${state.shopping.length?`<div class="list">${state.shopping.map(i=>`<div class="item ${i.checked?'done':''}"><div style="display:flex;align-items:center;gap:10px"><button class="check" onclick="state.shopping.find(x=>x.id==${i.id}).checked=!state.shopping.find(x=>x.id==${i.id}).checked;save();shopping()">${i.checked?'✓':''}</button><b>${esc(i.name)}</b></div><div><span dir="ltr">${amount(i.amount)} ${esc(i.unit)}</span> <button class="link" onclick="state.shopping=state.shopping.filter(x=>x.id!=${i.id});save();shopping()">מחק</button></div></div>`).join('')}</div>`:`<div class="empty">רשימת הקניות ריקה. הוסיפו מצרכים מתוך מתכונים.</div>`}</section>`;updateCounts()}
    function planner(){const days=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];app().innerHTML=`<h1 class="page-title">📅 תכנון שבועי</h1><p style="color:#57534e">גרסה ראשונית לתכנון ארוחות שבועי. ניתן להוסיף מתכונים דרך מסך המתכונים.</p><section class="planner">${days.map(d=>`<div class="day"><h3>יום ${d}</h3><div class="empty" style="padding:20px">אין ארוחות מתוכננות<br><button class="link" onclick="go('recipes')">הוסף מתכון</button></div></div>`).join('')}</section>`;updateCounts()}
    function render(){if(view==='home')dashboard();else if(view==='recipes')recipesList(false);else if(view==='favorites')recipesList(true);else if(view==='details')details();else if(view==='form')form();else if(view==='shopping')shopping();else if(view==='planner')planner();updateCounts()}
    render();
  </script>
</body>
</html>
